name: Build macOS DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install --upgrade pyinstaller

      - name: Build standalone binary
        run: pyinstaller --onefile --name tasks tasks.py

      - name: Stage DMG contents
        run: |
          mkdir -p dist/dmg
          cp dist/tasks dist/dmg/tasks
          cp README.md dist/dmg/README.md
          # Convenience installer that drops the binary on the user's PATH.
          cat > dist/dmg/install.sh <<'EOF'
          #!/bin/bash
          set -e
          DEST="${1:-/usr/local/bin}"
          DIR="$(cd "$(dirname "$0")" && pwd)"
          echo "Installing 'tasks' to $DEST (may prompt for sudo)..."
          sudo install -m 0755 "$DIR/tasks" "$DEST/tasks"
          echo "Done. Run: tasks --help"
          EOF
          chmod +x dist/dmg/install.sh

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Simple Task Manager" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            dist/SimpleTaskManager.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleTaskManager-dmg
          path: dist/SimpleTaskManager.dmg

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SimpleTaskManager.dmg
